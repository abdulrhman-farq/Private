# Codemagic CI/CD — fastest Mac-less path to Internal TestFlight.
# One-time setup in Codemagic UI (see docs/ios-build-guide.md):
#   1. Connect this GitHub repo.
#   2. Team → Integrations → App Store Connect: add an API key named exactly "CodemagicASC".
#   3. Run the "ios-internal-testflight" workflow.
# Capacitor 8 uses Swift Package Manager, so NO CocoaPods step is needed.
workflows:
  ios-internal-testflight:
    name: iOS — Internal TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: CodemagicASC
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: sa.farq.rweida
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
      node: 20
      xcode: 16
    scripts:
      - name: Install npm dependencies
        script: npm ci
      - name: Build web app (Vite)
        script: npm run build
      - name: Capacitor sync (iOS)
        script: npx cap sync ios
      - name: Set unique build number
        script: |
          cd "$CM_BUILD_DIR/ios/App"
          agvtool new-version -all "$(($BUILD_NUMBER + 1))"
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # Uncomment and set your internal group name to auto-distribute:
        # beta_groups:
        #   - Internal Testers
